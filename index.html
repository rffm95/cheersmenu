<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHEERS | Luxury Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #050505; }
        body { background-color: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .gold-gradient { background: linear-gradient(135deg, #c5a059 0%, #f7e0b1 50%, #c5a059 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(197, 160, 89, 0.15); border-radius: 24px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glass-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .img-container { width: 100%; height: 160px; border-radius: 20px; overflow: hidden; background: #111; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.5s; }
        .glass-card:hover img { opacity: 1; scale: 1.1; }
        .badge { background: var(--gold); color: #000; padding: 2px 10px; border-radius: 50px; font-size: 0.6rem; font-weight: 800; text-uppercase; position: absolute; top: 10px; right: 10px; z-index: 10; }
        /* Esconder scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <header class="relative h-[40vh] flex flex-col items-center justify-center text-center p-6 border-b border-white/5">
        <div class="absolute inset-0 opacity-40" style="background: radial-gradient(circle at center, #c5a05933 0%, transparent 70%);"></div>
        <h1 class="serif text-6xl gold-gradient tracking-tighter mb-2">Cheers</h1>
        <p class="uppercase tracking-[0.3em] text-[10px] opacity-60">Premium Bar & Kitchen</p>
    </header>

    <!-- Food Highlight Slider (Para vender mais comida) -->
    <section class="py-8">
        <h2 class="px-6 serif text-2xl mb-4">Especialidades da Cozinha</h2>
        <div class="flex overflow-x-auto gap-4 px-6 pb-4" id="foodHighlights">
            <!-- Injected by JS -->
        </div>
    </section>

    <!-- Categories Tab -->
    <nav class="sticky top-0 z-50 bg-[#050505]/80 backdrop-blur-md border-b border-white/5 py-4 px-4">
        <div class="flex gap-8 overflow-x-auto whitespace-nowrap justify-center text-[10px] uppercase tracking-widest font-semibold" id="catNav">
            <!-- Injected by JS -->
        </div>
    </nav>

    <!-- Main Menu -->
    <main class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="menuGrid">
        <!-- Items Injected by JS -->
    </main>

    <script src="script.js"></script>
</body>
</html>
