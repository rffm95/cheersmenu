<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHEERS | Interactive Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark-bg: #111111; --card-bg: #1a1a1a; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-bg); color: #f0f0f0; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .gold-text { color: var(--gold); }
        .active-filter { background: var(--gold); color: #000; }
        .category-icon { border: 2px solid #444; transition: border-color 0.3s; }
        .active-category { border-color: var(--gold); }
        .popular-card { box-shadow: 0 0 25px rgba(212, 175, 55, 0.2); border-color: rgba(212, 175, 55, 0.4); }
        #detailPanel, #panelBackdrop { display: none; } /* Hidden by default */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Header -->
    <header class="p-6 text-center">
        <h1 class="font-serif text-4xl gold-text tracking-widest">Cheers</h1>
        <p class="text-xs tracking-widest opacity-50 uppercase mt-1">O seu menu interativo</p>
    </header>

    <!-- Quick Filters (Fome / Sede) -->
    <div class="px-6 mb-6 flex justify-center">
        <div class="bg-[#222] p-1 rounded-full flex text-xs font-semibold">
            <button id="filter-all" class="px-6 py-2 rounded-full transition-all duration-300">Todos</button>
            <button id="filter-food" class="px-6 py-2 rounded-full transition-all duration-300">Tenho Fome</button>
            <button id="filter-drinks" class="px-6 py-2 rounded-full transition-all duration-300">Só Quero Beber</button>
        </div>
    </div>

    <!-- Category Icons (Story Style) -->
    <nav class="px-6 mb-8">
        <div id="category-nav" class="flex items-center gap-4 overflow-x-auto pb-3">
            <!-- Icons injected by JS -->
        </div>
    </nav>

    <!-- Menu Grid -->
    <main id="menu-grid" class="px-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        <!-- Items injected by JS -->
    </main>

    <!-- Detail Panel (Hidden by default) -->
    <div id="panelBackdrop" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-40"></div>
    <aside id="detailPanel" class="fixed top-0 right-0 h-full w-full max-w-md bg-black border-l border-white/10 z-50 transform translate-x-full">
        <div class="h-full w-full overflow-y-auto">
            <img id="detail-img" src="" class="h-80 w-full object-cover" alt="Detalhe do produto">
            <div class="p-6">
                <h2 id="detail-name" class="font-serif text-4xl gold-text mb-2"></h2>
                <span id="detail-price" class="text-2xl font-semibold mb-6 block"></span>
                <p id="detail-desc" class="text-sm opacity-70 leading-relaxed"></p>
            </div>
            <button id="closePanelBtn" class="absolute top-4 right-4 bg-black/50 p-2 rounded-full">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
    </aside>

    <script src="script.js"></script>
</body>
</html>
