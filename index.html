<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHEERS | Menu Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; }
        body { background-color: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Estilo Stories */
        .story-circle { width: 70px; height: 70px; border-radius: 50%; padding: 3px; border: 2px solid var(--gold); transition: 0.3s; flex-shrink: 0; }
        .active-story { background: var(--gold); border-color: #fff; }
        
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.1); border-radius: 20px; overflow: hidden; }
        .popular-badge { background: linear-gradient(90deg, #c5a059, #f7e0b1); color: #000; font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 4px; position: absolute; top: 12px; left: 12px; z-index: 5; }
        
        /* Modal */
        #modal { display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <!-- Header & Filtros Rápidos -->
    <header class="p-8 text-center">
        <h1 class="serif text-5xl text-[#c5a059] mb-6">Cheers</h1>
        
        <div class="flex justify-center gap-2 mb-8">
            <button onclick="quickFilter('all')" class="q-btn bg-white/5 px-4 py-2 rounded-full text-[10px] uppercase tracking-widest border border-white/10">Todos</button>
            <button onclick="quickFilter('fome')" class="q-btn bg-white/5 px-4 py-2 rounded-full text-[10px] uppercase tracking-widest border border-white/10">Tenho Fome</button>
            <button onclick="quickFilter('beber')" class="q-btn bg-white/5 px-4 py-2 rounded-full text-[10px] uppercase tracking-widest border border-white/10">Só Quero Beber</button>
        </div>
    </header>

    <!-- Categorias Estilo Stories -->
    <div class="flex overflow-x-auto gap-6 px-6 mb-10 no-scrollbar" id="storyNav">
        <!-- Injected by JS -->
    </div>

    <!-- Grelha de Itens -->
    <main class="px-6 grid grid-cols-1 gap-6" id="menuGrid">
        <!-- Injected by JS -->
    </main>

    <!-- Modal de Detalhes -->
    <div id="modal" class="fixed inset-0 z-[100] p-6 flex items-center justify-center">
        <div class="glass-card w-full max-w-md relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-10 bg-black/50 p-2 rounded-full"><i data-lucide="x"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
