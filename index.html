<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHEERS | Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; }
        body { background-color: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; width: 100%; }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* Menu de Categorias Sticky */
        .cat-bar { scrollbar-width: none; -ms-overflow-style: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .active-cat { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* Item da Lista */
        .menu-item { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-item:active { background: rgba(255,255,255,0.05); }

        /* Thumbnail Redondo */
        .thumb { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 1px solid rgba(197, 160, 89, 0.3); }
        
        /* Modal Otimizado */
        #modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header com Logo -->
    <header class="p-6 flex flex-col items-center border-b border-white/5">
        <img src="input_file_5.png" alt="Cheers Logo" class="w-24 mb-2">
        <p class="text-[10px] uppercase tracking-[0.4em] text-white/40">O Seu Menu Interativo</p>
    </header>

    <!-- Filtros Rápidos (UX Melhorada) -->
    <div class="flex justify-around py-3 bg-white/5 text-[10px] uppercase tracking-widest font-bold border-b border-white/10">
        <button onclick="quickFilter('fome')" class="flex items-center gap-2"><i data-lucide="utensils" class="w-3"></i> Cozinha</button>
        <button onclick="quickFilter('beber')" class="flex items-center gap-2"><i data-lucide="glass-water" class="w-3"></i> Bar</button>
        <button onclick="window.open('https://instagram.com/cheers_o_bar')" class="flex items-center gap-2 text-pink-500"><i data-lucide="instagram" class="w-3"></i> @cheers_o_bar</button>
    </div>

    <!-- Navegação de Categorias (Horizontal) -->
    <nav class="sticky top-0 z-40 bg-[#050505] border-b border-white/5 overflow-x-auto cat-bar flex px-4">
        <!-- Injetado por JS -->
    </nav>

    <!-- Lista de Itens -->
    <main class="flex-1" id="menuList">
        <!-- Injetado por JS -->
    </main>

    <!-- Modal de Detalhes -->
    <div id="modal" class="p-6 items-center justify-center">
        <div class="bg-[#111] rounded-3xl overflow-hidden w-full max-w-sm relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 p-2 rounded-full"><i data-lucide="x"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
