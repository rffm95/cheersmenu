<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHEERS | Premium Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .gold-text { color: #d4af37; }
        .gold-bg { background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-active { border-bottom: 2px solid #d4af37; color: #d4af37; font-weight: 600; }
        ::-webkit-scrollbar { display: none; }
        .item-card:active { transform: scale(0.98); transition: 0.1s; }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="p-6 text-center pt-12">
        <h1 style="font-family: 'Playfair Display', serif;" class="text-4xl tracking-widest uppercase gold-text">Cheers</h1>
        <p class="text-xs tracking-widest opacity-50 uppercase mt-2">Cocktails & Experiences</p>
    </header>

    <!-- Interactive Search & Lucky -->
    <div class="px-4 mb-6 flex gap-2">
        <div class="glass flex-1 rounded-full px-4 py-2 flex items-center gap-2">
            <i data-lucide="search" class="w-4 h-4 opacity-50"></i>
            <input type="text" id="searchInput" placeholder="O que deseja beber?" class="bg-transparent border-none outline-none text-sm w-full">
        </div>
        <button onclick="feelingLucky()" class="gold-bg p-3 rounded-full text-black shadow-lg shadow-yellow-900/20">
            <i data-lucide="sparkles" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Category Navigation -->
    <nav class="sticky top-0 z-50 glass mb-6 overflow-x-auto whitespace-nowrap px-4 py-3 flex gap-6 text-sm uppercase tracking-tighter" id="catNav">
        <!-- Categories injected by JS -->
    </nav>

    <!-- Menu Items Grid -->
    <main class="px-4 space-y-8" id="menuContainer">
        <!-- Items injected by JS -->
    </main>

    <!-- Footer Action -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
        <a href="#reservas" class="glass px-8 py-3 rounded-full gold-text border border-yellow-700/30 text-sm font-semibold uppercase tracking-widest flex items-center gap-2">
            <i data-lucide="calendar" class="w-4 h-4"></i> Reservar Mesa
        </a>
    </div>

    <!-- Lucky Modal -->
    <div id="luckyModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-6 bg-black/90">
        <div class="glass p-8 rounded-3xl text-center max-w-xs w-full">
            <h2 class="gold-text text-xl mb-2">A nossa sugestão:</h2>
            <div id="luckyResult" class="text-3xl font-serif py-6"></div>
            <button onclick="closeLucky()" class="text-xs uppercase tracking-widest opacity-50 mt-4">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
